<!-- Confirm Dialog -->
<div class="modal" id="confirmDialog">
    <div class="modal-content confirm-dialog">
        <div class="confirm-header">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Potvrda otkazivanja</h3>
        </div>
        <div class="confirm-body">
            <p>Da li ste sigurni da želite da otkažete ovu rezervaciju?</p>
            <p class="confirm-subtitle">Ova akcija se ne može poništiti.</p>
        </div>
        <div class="confirm-actions">
            <button class="btn-secondary" id="confirmCancelBtn">
                <i class="fas fa-times"></i> Odustani
            </button>
            <button class="btn-danger" id="confirmActionBtn">
                <i class="fas fa-check"></i> Potvrdi
            </button>
        </div>
    </div>
</div>
